<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thoughts Mapper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="appShell" class="app-shell">
      <aside class="left-panel" aria-label="Thoughts">
        <header class="brand">
          <div class="brand-mark" aria-hidden="true">TM</div>
          <div>
            <h1>Thoughts Mapper</h1>
            <p id="saveState">Ready</p>
          </div>
        </header>

        <div class="project-controls" aria-label="Projects">
          <label class="field compact-field">
            <span>Project</span>
            <select id="projectSelect"></select>
          </label>
          <label class="field compact-field">
            <span>Project name</span>
            <input id="projectNameInput" type="text" maxlength="80" />
          </label>
          <label class="field compact-field">
            <span>New from template</span>
            <select id="templateSelect">
              <option value="">Choose template</option>
            </select>
          </label>
          <input id="newProjectNameInput" type="text" maxlength="80" placeholder="New project name" autocomplete="off" />
          <button id="createTemplateButton" type="button">Create project</button>
        </div>

        <label class="search-box">
          <span aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="Search titles, notes, tags" autocomplete="off" />
        </label>

        <form id="quickCaptureForm" class="quick-add">
          <input id="quickCaptureInput" type="text" maxlength="80" placeholder="Capture to inbox" autocomplete="off" />
          <button type="submit" title="Capture unlinked thought" aria-label="Capture unlinked thought">+</button>
        </form>

        <div class="filter-row">
          <select id="tagFilterInput" aria-label="Filter by tag">
            <option value="">All tags</option>
          </select>
          <button id="inboxFilterButton" type="button" title="Show unlinked inbox thoughts">Inbox <span id="inboxCount">0</span></button>
        </div>

        <div class="section-heading">
          <span>Thoughts</span>
          <span id="thoughtCount">0</span>
        </div>
        <nav id="thoughtList" class="thought-list" aria-label="Thought list"></nav>

        <div class="sidebar-actions">
          <button id="exportButton" type="button" title="Export a full JSON backup">Backup (JSON)</button>
          <button id="markdownExportButton" type="button" title="Export notes as a Markdown document">Export Notes Only</button>
          <label class="file-button">
            Import (JSON)
            <input id="importInput" type="file" accept="application/json" />
          </label>
        </div>
      </aside>

      <main class="map-stage" aria-label="Thought map">
        <div class="ambient-layer" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="stage-toolbar" aria-label="Map tools">
          <button id="sidebarToggleButton" type="button" title="Hide thoughts sidebar" aria-label="Hide thoughts sidebar">Hide list</button>
          <button id="undoButton" type="button" title="Undo" aria-label="Undo">Undo</button>
          <button id="redoButton" type="button" title="Redo" aria-label="Redo">Redo</button>
          <button id="fitButton" type="button" title="Fit map" aria-label="Fit map">Fit</button>
          <button id="centerButton" type="button" title="Center thought" aria-label="Center thought">Center</button>
          <button id="resetButton" type="button" title="Reset camera to default zoom and origin" aria-label="Reset camera to default zoom and origin">Reset</button>
          <button id="settingsButton" type="button" title="Open settings" aria-label="Open settings">Settings</button>
        </div>
        <svg id="graph" role="img" aria-label="Visual thought graph">
          <defs>
            <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#20344f" flood-opacity="0.16" />
            </filter>
          </defs>
          <rect id="graphBackground" width="100%" height="100%" />
          <g id="viewport">
            <g id="linksLayer"></g>
            <g id="nodesLayer"></g>
          </g>
        </svg>
      </main>

      <aside class="right-panel" aria-label="Thought details">
        <section id="detailsEmpty" class="empty-state">
          <h2>Map</h2>
          <p>Create or select a thought.</p>
        </section>

        <section id="detailsPanel" class="details-panel" hidden>
          <div class="details-topline">
            <span id="selectedType" class="type-pill">Idea</span>
            <button id="deleteButton" class="danger-button" type="button">Delete</button>
          </div>

          <label class="field">
            <span>Title</span>
            <input id="titleInput" type="text" maxlength="80" />
          </label>

          <label class="field">
            <span>Kind</span>
            <select id="kindInput">
              <option value="idea">Idea</option>
              <option value="project">Project</option>
              <option value="person">Person</option>
              <option value="resource">Resource</option>
              <option value="question">Question</option>
            </select>
          </label>

          <label class="field">
            <span>Tags</span>
            <input id="tagInput" type="text" placeholder="research, project, later" />
          </label>

          <section id="inboxPlacementPanel" class="inbox-placement" hidden>
            <div>
              <strong>Inbox thought</strong>
              <p>Place it when you know where it belongs.</p>
            </div>
            <div class="place-form">
              <select id="placeTargetInput" aria-label="Place with thought"></select>
              <select id="placeRelationInput" aria-label="Placement relation">
                <option value="parent-of">Make it a child of</option>
                <option value="child-of">Make it a parent of</option>
                <option value="related">Relate it to</option>
              </select>
              <button id="placeThoughtButton" type="button">Place thought</button>
            </div>
          </section>

          <div class="field field-notes">
            <span>Notes</span>
            <div
              id="notePreview"
              class="note-preview"
              role="button"
              tabindex="0"
              aria-label="Notes preview. Activate to edit. Markdown supported."
            ></div>
            <textarea id="noteInput" rows="12" hidden></textarea>
          </div>

          <form id="linkForm" class="link-form">
            <label class="field">
              <span>Connect</span>
              <select id="linkTargetInput"></select>
            </label>
            <label class="field">
              <span>Relation</span>
              <select id="linkRelationInput">
                <option value="parent-of">Selected is parent of target</option>
                <option value="child-of">Selected is child of target</option>
                <option value="related">Related to</option>
              </select>
            </label>
            <button type="submit">Link</button>
          </form>

          <div class="section-heading">
            <span>Connected</span>
            <span id="connectionCount">0</span>
          </div>
          <div id="connectionList" class="connection-list"></div>

          <div class="section-heading">
            <span>Backlinks</span>
            <span id="backlinkCount">0</span>
          </div>
          <div id="backlinkList" class="connection-list"></div>

          <div class="section-heading">
            <span>Mentions</span>
            <span id="mentionCount">0</span>
          </div>
          <div id="mentionList" class="connection-list"></div>
        </section>
      </aside>
    </div>

    <div id="contextMenu" class="context-menu" hidden>
      <form id="nodeCreateForm">
        <div class="context-title">New connected thought</div>
        <input id="nodeCreateInput" type="text" maxlength="80" placeholder="Thought title" autocomplete="off" />
        <select id="nodeCreateRelationInput" aria-label="Relationship">
          <option value="parent-of">Child of this thought</option>
          <option value="child-of">Parent of this thought</option>
          <option value="related">Related to this thought</option>
        </select>
        <div class="context-actions">
          <button id="nodeCreateCancelButton" type="button">Cancel</button>
          <button type="submit">Create</button>
        </div>
      </form>
    </div>

    <section id="settingsPage" class="settings-page" hidden aria-label="Settings">
      <div class="settings-card">
        <header class="settings-header">
          <div>
            <h2>Settings</h2>
            <p>Visual preferences for the current map.</p>
          </div>
          <button id="settingsCloseButton" type="button" aria-label="Close settings">Close</button>
        </header>

        <div class="settings-grid">
          <label class="field">
            <span>Line thickness</span>
            <input id="lineThicknessInput" type="range" min="1" max="8" step="0.5" />
          </label>
          <output id="lineThicknessValue" class="setting-value">2.5</output>

          <label class="field">
            <span>Line connection type</span>
            <select id="connectionTypeInput">
              <option value="straight">Straight</option>
              <option value="curve">Curve</option>
            </select>
          </label>

          <label class="field">
            <span>Line endpoint</span>
            <select id="lineEndpointInput">
              <option value="floating">Floating line</option>
              <option value="touching">Touching line</option>
            </select>
          </label>

          <label class="field">
            <span>Colour scheme</span>
            <select id="colourSchemeInput" aria-label="Colour scheme">
              <option value="light-mint">Light mint</option>
              <option value="light-sky">Light sky</option>
              <option value="light-blush">Light blush</option>
              <option value="light-leaves">Light leaves</option>
              <option value="light-rain">Light rain</option>
              <option value="light-snow">Light snow</option>
              <option value="light-ocean">Light ocean</option>
              <option value="dark-mint">Dark mint</option>
              <option value="dark-sky">Dark sky</option>
              <option value="dark-blush">Dark blush</option>
              <option value="dark-fire">Dark fire</option>
              <option value="dark-leaves">Dark leaves</option>
              <option value="dark-blackhole">Dark black hole</option>
              <option value="dark-aurora">Dark aurora</option>
              <option value="dark-rain">Dark rain</option>
              <option value="dark-snow">Dark snow</option>
              <option value="dark-nebula">Dark nebula</option>
              <option value="dark-starfield">Dark starfield</option>
              <option value="dark-ocean">Dark ocean</option>
            </select>
          </label>
        </div>
      </div>
    </section>

    <script src="app.js" defer></script>
  </body>
</html>
